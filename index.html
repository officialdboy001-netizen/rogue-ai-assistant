<!DOCTYPE html>
<html>
	<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Rogue</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<section class="main">
				<header>
					<div class="overlay"></div>
					<div class=""><i onclick="showSideBar()" class="open menu fa-solid fa-bars-staggered"></i>
								<div class="side-bar">
				<div class="side-bar-inner">
					<label>Quick</label>
						<div><i class="fa-solid fa-pen-to-square"></i>New chat</div>
						<div><i class="fa-solid fa-magnifying-glass"></i>Search chats</div>
						<div><i class="fa-solid fa-box-archive"></i>Archived</div>
						<label>Projects</label>
						<div><i class="fa-solid fa-folder-plus"></i>New project</div>
						<label>Recents</label>
				</div>
			</div>
					</div>
					<div class="logo" >
						<h2 onclick="showModel()" class="logo-name">Rogue</h2>
						<i onclick="showModel()" class="fa-solid fa-caret-down"></i>
				  	<div id="model-option" class="model-option">
						<p><i></i>Default</p>
						<p><i></i>Precise</p>
						<p><i></i>Think</p>
						<p><i></i>Web search</p>
						</div>
					</div>

				
				<div class="header-right">
					<div class="open incognito"><i onclick="" class="fa-solid fa-eye-slash"></i></div>
					<div class="open more"><i onclick="showMore()" class="fa-solid fa-ellipsis-vertical"></i></div>
			    <div class="more-option">
			    	<p>Greetings</p>
			    	<p><i class="fa-solid fa-pen-to-square"></i>Rename</p>
			    	<p><i class="fa-solid fa-house-flag"></i>Add to home</p>
			    	<p><i class="fa-solid fa-thumbtack"></i>Pin</p>
			    	<p><i class="fa-solid fa-share"></i>Export</p>
			    	<p><i class="fa-solid fa-user-plus"></i>Add people</p>
			    	<p><i class="fa-solid fa-magnifying-glass fa-beat-fade"></i>Search in chat</p>
			    	<p><i class="fa-solid fa-trash-can"></i>Delete</p>
			    </div>
				</div>
				</header>
				
				<div class="chat-box">
					<h3 id="welcome">Let's get started</h3>
					
						</div>
						
						<div class="input-area">
							<div class="input-inner">
								<div onclick="showImport()" class="action import"><i class="fa-solid fa-plus"></i></div>
								<textarea placeholder="chat rogue..." name="" id="input"></textarea>
								<div class="action send"><i class="fa-solid fa-paper-plane"></i></div>
							</div>
							
						</div>
						<div class="error">Rouge is AI and can make mistakes. Learn more</div>
	

		</section>
	
		<script src="script.js"></script>
	</body>
</html>
